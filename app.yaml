# https://cloud.google.com/appengine/docs/the-appengine-environments#comparing_high-level_features
# https://cloud.google.com/appengine/docs/standard

runtime: java
env: flex                    # switch to Flexible environment

runtime_config:
  operating_system: "ubuntu24"
  runtime_version: "25"

resources:
  cpu: 1
  memory_gb: 1.7
  disk_size_gb: 10

network:
  session_affinity: true     # needed for websockets

automatic_scaling:
  min_num_instances: 1
  max_num_instances: 20
  cpu_utilization:
    target_utilization: 0.7

env_variables:
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_REDIRECT_URI: "https://api.bettertogeter.ch/calendar/callback"
  FRONTEND_REDIRECT_URI: "https://bettertogeter.ch/"
  APP_COOKIE_DOMAIN: ".bettertogeter.ch"